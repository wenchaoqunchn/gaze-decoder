name: gazedecoder
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  # PyTorch (CUDA 11.8 build — remove +cu118 suffix for CPU-only)
  - pip:
    - torch>=2.0.0
    - torchvision>=0.15.0
    - sentence-transformers>=2.2.0
    - transformers>=4.30.0
    - scikit-learn>=1.3.0
    - xgboost>=2.0.0
    - lightgbm>=4.0.0
    - numpy>=1.24.0
    - pandas>=2.0.0
    - matplotlib>=3.7.0
    - seaborn>=0.12.0
    - jupyter>=1.0.0
    - ipykernel>=6.0.0
    - nbconvert>=7.0.0
    - tqdm>=4.65.0
    - scipy>=1.10.0
